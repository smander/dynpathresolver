version: '3.8'

# x86-64 specific compose file for better performance
# Usage: docker-compose -f docker-compose.x86_64.yml up -d

services:
  dynpathresolver-x64:
    build:
      context: .
      dockerfile: Dockerfile.x86_64
      platforms:
        - linux/amd64
    platform: linux/amd64
    container_name: dynpathresolver-x64
    volumes:
      # Mount for live development
      - ./dynpathresolver:/app/dynpathresolver
      - ./tests:/app/tests
      - ./examples:/app/examples
      - ./evaluate.py:/app/evaluate.py
      - ./evaluate_simple.py:/app/evaluate_simple.py
      # Output directory for analysis results
      - ./output:/app/output
    working_dir: /app
    command: ["bash"]
    stdin_open: true
    tty: true

  # Service for running Frida validation (x86-64)
  validate-x64:
    build:
      context: .
      dockerfile: Dockerfile.x86_64
      platforms:
        - linux/amd64
    platform: linux/amd64
    container_name: dynpathresolver-validate-x64
    volumes:
      - ./dynpathresolver:/app/dynpathresolver
      - ./examples:/app/examples
      - ./output:/app/output
      - ./evaluate.py:/app/evaluate.py
    working_dir: /app
    command: ["python", "evaluate.py", "--all", "--validation-mode", "validate", "--verbose"]
    privileged: true
    security_opt:
      - seccomp:unconfined

  # Service for running tests (x86-64)
  test-x64:
    build:
      context: .
      dockerfile: Dockerfile.x86_64
      platforms:
        - linux/amd64
    platform: linux/amd64
    container_name: dynpathresolver-test-x64
    volumes:
      - ./dynpathresolver:/app/dynpathresolver
      - ./tests:/app/tests
    working_dir: /app
    command: ["pytest", "-v", "--tb=short"]

  # Service for running analysis benchmarks (x86-64)
  analyze-x64:
    build:
      context: .
      dockerfile: Dockerfile.x86_64
      platforms:
        - linux/amd64
    platform: linux/amd64
    container_name: dynpathresolver-analyze-x64
    volumes:
      - ./dynpathresolver:/app/dynpathresolver
      - ./examples:/app/examples
      - ./output:/app/output
    working_dir: /app
    command: ["python", "examples/benchmarks/run_analysis.py"]
